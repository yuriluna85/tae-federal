name: Update News Feed

on:
  schedule:
    - cron: '0 8 * * *' # Executa todos os dias às 8:00 UTC (5:00 Horário de Brasília)
  workflow_dispatch: # Permite execução manual

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run news scraper
      run: python scripts/atualizar_noticias_tae.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add noticias.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update news feed via GitHub Actions" && git push)
